name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Run tests
        run: npm test -- --run
        env:
          VITE_ANTHROPIC_API_KEY: ''
          VITE_FIREBASE_API_KEY: ''
          VITE_FIREBASE_AUTH_DOMAIN: ''
          VITE_FIREBASE_PROJECT_ID: ''
          VITE_RESEND_API_KEY: ''